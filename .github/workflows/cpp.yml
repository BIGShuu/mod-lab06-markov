name: C++ CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libgtest-dev build-essential
        cd /usr/src/gtest
        sudo cmake CMakeLists.txt
        sudo make
        sudo cp *.a /usr/lib

    - name: Configure CMake
      run: cmake -B build -DBUILD_TESTING=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Run generator
      run: |
        mkdir -p result
        ./build/src/markov data/pushkin.txt result/gen.txt 42

    - name: Check output
      run: |
        if [ -s result/gen.txt ]; then
          echo "Generated file exists and is non-empty"
          wc -w result/gen.txt
        else
          echo "ERROR: Generated file is missing or empty"
          exit 1
        fi
